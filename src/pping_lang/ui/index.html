                <template x-if="r.precondition.length">
                  <span><span class="meta-sep"></span><span x-text="t('rules.precondition')"></span><span x-text="r.precondition.join(' / ')"></span></span>
                </template>
                <template x-if="r.checks.length > 1">
                  <span><span class="meta-sep"></span><span x-text="r.match === 'any' ? t('rules.matchAny') : t('rules.matchAll')"></span></span>
                </template>
              </div>
              <div class="rule-row-cond" style="flex-wrap:wrap; gap:8px;">
                <template x-for="(c, i) in r.checks" :key="i">
                  <span class="cond-pill">
                    <span x-text="c.aggregation + '(' + c.metric + ')'"></span>
                    <span class="op" x-text="c.op"></span>
                    <span x-text="c.threshold"></span>
                    <template x-if="c.threshold_ref"><span class="cond-agg" x-text="'← '+c.threshold_ref"></span></template>
                    <span class="cond-agg" x-text="c.window_seconds + 's'"></span>
                  </span>
                </template>
                <template x-if="r.kind === 'classifier'"><span class="cond-agg" x-text="t('rules.classifierNote')"></span></template>
              </div>
              <template x-if="r.hypothesis">
                <div class="diag-sug" style="margin-top:10px;">
                  <div class="diag-sug-label" x-text="t('common.inference')"></div>
                  <div class="diag-sug-text" x-text="r.hypothesis"></div>
                </div>
              </template>
              <template x-if="r.suggestion">
                <div class="diag-sug" style="margin-top:8px;">
                  <div class="diag-sug-label" x-text="t('common.suggestion')"></div>
                  <div class="diag-sug-text" x-text="r.suggestion"></div>
                </div>
              </template>
            </div>
          </div>
        </template>
      </div>

      <!-- 自定义规则(你建的;和策展规则同一引擎评、同一面板冒)-->
      <div class="section-head" style="margin-top: 28px;">
        <h2><span x-text="t('rules.customTitle')"></span><span class="count" x-text="`(${customRules.length})`"></span></h2>
        <span class="hint" x-text="customEditable ? t('rules.customHintActive') : t('rules.customHintInactive')"></span>
      </div>
      <div class="rules-list">
        <template x-if="customRules.length === 0">
          <div class="rule-row" style="display:block; color: var(--text-dim);" x-text="t('rules.customEmpty')"></div>
        </template>
        <template x-for="r in customRules" :key="r.id">
          <div class="rule-row">
            <div class="rule-row-main">
              <div class="rule-row-head">
                <h3 class="rule-row-name" x-text="r.name"></h3>
                <span class="sev-pill" :class="r.severity" x-text="r.severity"></span>
                <span class="badge" x-text="t('kind.custom')"></span>
              </div>
              <div class="rule-row-meta"><code x-text="r.id"></code></div>
              <div class="rule-row-cond">
                <span class="cond-pill">
                  <span x-text="r.aggregation + '(' + r.metric + ')'"></span>
                  <span class="op" x-text="r.op"></span>
                  <span x-text="r.threshold"></span>
                  <span class="cond-agg" x-text="r.window_seconds + 's'"></span>
                </span>
              </div>
              <template x-if="r.hypothesis">
                <div class="diag-sug" style="margin-top:10px;">
                  <div class="diag-sug-label" x-text="t('common.inference')"></div>
                  <div class="diag-sug-text" x-text="r.hypothesis"></div>
                </div>
              </template>
              <template x-if="r.suggestion">
                <div class="diag-sug" style="margin-top:8px;">
                  <div class="diag-sug-label" x-text="t('common.suggestion')"></div>
                  <div class="diag-sug-text" x-text="r.suggestion"></div>
                </div>
              </template>
            </div>
            <div class="rule-row-actions">
              <button :title="t('common.edit')" @click="editRule(r)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
              </button>
              <button :title="t('common.delete')" class="danger" @click="deleteRule(r)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
              </button>
            </div>
          </div>
        </template>
      </div>

      <!-- 自定义规则 新建/编辑 弹框 -->
      <div x-show="editing" x-cloak class="modal-backdrop" @click.self="cancelEdit()" @keydown.escape.window="editing && cancelEdit()">
        <div class="modal rule-modal" role="dialog" aria-modal="true">
          <div class="modal-head">
            <h2 x-text="editingExisting ? t('custom.editTitle.edit') : t('custom.editTitle.new')"></h2>
            <button class="modal-close" @click="cancelEdit()" :aria-label="t('custom.closeBtn')">×</button>
          </div>
          <form @submit.prevent="saveRule()" class="rule-modal-form" x-show="editing">
            <div class="modal-body">
              <div class="form-grid">
                <label class="full"><span x-text="t('custom.name')"></span> <span class="hint-inline" x-text="t('custom.nameHint')"></span>
                  <input type="text" x-model="editing.name" required>
                </label>
                <label class="full" x-text="t('custom.metric')"></label>
                  <select x-model="editing.metric">
                    <template x-for="m in availableMetrics" :key="m"><option :value="m" x-text="m"></option></template>
                  </select>
                </label>
                <label x-text="t('custom.operator')"></label>
                  <select x-model="editing.op">
                    <option value="<">&lt;</option><option value="<=">&le;</option>
                    <option value=">">&gt;</option><option value=">=">&ge;</option>
                    <option value="==">==</option><option value="!=">!=</option>
                  </select>
                </label>
                <label x-text="t('custom.threshold')"></label>
                  <input type="number" step="any" x-model.number="editing.threshold" required>
                </label>
                <label x-text="t('custom.windowSeconds')"></label>
                  <input type="number" min="1" x-model.number="editing.window_seconds" required>
                </label>
                <label x-text="t('custom.aggregation')"></label>
                  <select x-model="editing.aggregation">
                    <option value="avg">avg</option><option value="p50">p50</option>
                    <option value="p95">p95</option><option value="p99">p99</option>
                    <option value="max">max</option><option value="min">min</option>
                    <option value="sum">sum</option><option value="count">count</option>
                  </select>
                </label>
                <label x-text="t('custom.severity')"></label>
                  <select x-model="editing.severity">
                    <option value="info">info</option><option value="warning">warning</option><option value="critical">critical</option>
                  </select>
                </label>
                <label class="full"><span x-text="t('custom.hypothesis')"></span> <span class="hint-inline" x-text="t('custom.hypothesisHint')"></span>
                  <textarea x-model="editing.hypothesis" rows="2"></textarea>
                </label>
                <label class="full"><span x-text="t('custom.suggestion')"></span> <span class="hint-inline" x-text="t('custom.suggestionHint')"></span>
                  <textarea x-model="editing.suggestion" rows="2"></textarea>
                </label>
              </div>
            </div>
            <div class="form-actions">
              <button type="button" class="btn secondary" @click="cancelEdit()" x-text="t('custom.cancelBtn')"></button>
              <button type="submit" class="btn primary" x-text="t('custom.saveBtn')"></button>
            </div>
          </form>
        </div>
      </div>

      <div x-show="toast" x-cloak class="toast" :class="{ error: toastError }" x-text="toast"></div>
    </div>

    <!-- ===== 压测 tab ===== -->
    <div x-show="tab === 'bench'" x-data="benchTab()" x-init="init()">

      <div class="section-head" style="margin-top: 0;">
        <h2 x-text="t('bench.createTitle')"></h2>
        <span class="hint" x-text="t('bench.createHint')"></span>
      </div>

      <div class="bench-form-card">
        <div class="form-grid">
          <label x-text="t('bench.name')"></label>
            <input type="text" x-model="form.name" :placeholder="t('bench.nameePlaceholder')"></input>
          </label>
          <label x-text="t('bench.api')"></label>
            <select x-model="form.api">
              <option value="chat">chat completions</option>
              <option value="completions">completions</option>
            </select>
          </label>
          <label class="full" x-text="t('bench.endpoint')"></label>
            <input type="text" x-model="form.endpoint" placeholder="http://localhost:8000" required></input>
            <span class="hint" x-text="t('bench.endpointHint')"></span>
          </label>
          <label class="full"><span x-text="t('bench.modelName')"></span> <span class="hint-inline" x-text="t('bench.modelNameSub')"></span></label>
            <input type="text" x-model="form.model" placeholder="Qwen/Qwen2.5-0.5B-Instruct" required></input>
            <span class="hint" x-text="t('bench.modelNameHint')"></span>
          </label>
          <label class="full" x-text="t('bench.promptSource')"></label>
            <select x-model="form.prompt_source" @change="onPromptSourceChange()">
              <template x-for="src in promptSources" :key="src.value">
                <option :value="src.value" x-text="src.label"></option>
              </template>
            </select>
            <span class="hint" x-text="currentPromptSourceDescription()"></span>
          </label>
          <label x-show="currentPromptSourceUsesPromptTokens()" x-text="t('bench.promptTokens')"></label>
            <input type="number" x-model.number="form.prompt_tokens" min="1">
          </label>
          <label x-text="t('bench.outputTokens')"></label>
            <input type="number" x-model.number="form.output_tokens" min="1">
          </label>
          <label x-text="t('bench.concurrency')"></label>
            <input type="number" x-model.number="form.concurrency" min="1">
          </label>
          <label x-text="t('bench.measureMode')"></label>
            <select x-model="form.boundedBy">
              <option value="duration" x-text="t('bench.measureByDuration')"></option>
              <option value="requests" x-text="t('bench.measureByRequests')"></option>
            </select>
          </label>
          <label x-show="form.boundedBy === 'duration'" x-text="t('bench.duration')"></label>
            <input type="number" x-model.number="form.duration_s" min="1">
          </label>
          <label x-show="form.boundedBy === 'requests'" x-text="t('bench.numRequests')"></label>
            <input type="number" x-model.number="form.num_requests" min="1">
          </label>
          <label x-text="t('bench.warmup')"></label>
            <input type="number" x-model.number="form.warmup_s" min="0">
          </label>
          <label x-text="t('bench.timeout')"></label>
            <input type="number" step="any" x-model.number="form.timeout_s" min="1">
          </label>
          <div class="full slo-section">
            <div class="slo-head">
              <span class="slo-label" x-text="t('bench.sloConstraint')"></span>
              <button type="button" class="slo-add-btn" @click="addSloRow()" x-text="t('bench.addSloBtn')"></button>
            </div>
            <div class="slo-empty" x-show="form.sloRows.length === 0" x-text="t('bench.sloEmpty')"></div>
            <template x-for="(row, i) in form.sloRows" :key="i">
              <div class="slo-row">
                <select x-model="row.metric" class="slo-field metric"
                        @change="onSloMetricChange(i)">
                  <option value="ttft" x-text="t('bench.sloMetricTtft')"></option>
                  <option value="tpot" x-text="t('bench.sloMetricTpot')"></option>
                  <option value="e2e" x-text="t('bench.sloMetricE2e')"></option>
                  <option value="error_rate" x-text="t('bench.sloMetricErrorRate')"></option>
                </select>
                <select x-model="row.percentile" class="slo-field pct"
                        :disabled="row.metric === 'error_rate'">
                  <option value="p50">p50</option>
                  <option value="p90">p90</option>
                  <option value="p95">p95</option>
                  <option value="p99">p99</option>
                  <option value="mean">mean</option>
                </select>
                <select x-model="row.op" class="slo-field op">
                  <option value="<">&lt;</option>
                  <option value="<=">≤</option>
                  <option value=">">&gt;</option>
                  <option value=">=">≥</option>
                </select>
                <input type="number" step="any" x-model.number="row.value"
                       class="slo-field value">
                <select x-model="row.unit" class="slo-field unit"
                        :disabled="row.metric === 'error_rate'">
                  <option value="ms">ms</option>
                  <option value="s">s</option>
                </select>
                <button type="button" class="slo-remove-btn"
                        @click="removeSloRow(i)" :title="t('bench.removeSloBtn')">×</button>
              </div>
            </template>
            <div class="slo-preview" x-show="form.sloRows.length > 0">
              <span class="slo-preview-label" x-text="t('bench.sloPreviewLabel')"></span>
              <code x-text="buildSloSpec() || t('bench.sloPreviewEmpty')"></code>
            </div>
          </div>
        </div>
        <div class="form-actions">
          <button class="btn primary" :disabled="submitting || !form.endpoint || !form.model" @click="submit()">
            <span x-show="!submitting" x-text="t('bench.submitBtn')"></span>
            <span x-show="submitting" x-cloak x-text="t('bench.submitting')"></span>
          </button>
        </div>
      </div>

      <!-- Currently running -->
      <div x-show="status.running && status.running.length > 0" x-cloak
           class="bench-running-card">
        <div class="bench-running-head">
          <span class="live-dot"></span>
          <span class="title" x-text="t('bench.running')"></span>
          <span class="count" x-text="status.running.length"></span>
        </div>
        <template x-for="r in status.running" :key="r.run_id">
          <div class="bench-running-row">
            <code class="rid" x-text="r.run_id"></code>
            <span class="name" x-text="r.scenario_name"></span>
            <span class="ago" x-text="agoText(r.started_at_ns)"></span>
          </div>
        </template>
      </div>

      <div class="section-head" style="margin-top: 28px;">
        <h2><span x-text="t('bench.historyTitle')"></span><span class="count" x-text="`(${runs.length})`"></span></h2>
        <span class="hint" x-text="t('bench.historyHint')"></span>
      </div>

      <template x-if="runs.length === 0">
        <div class="empty">
          <div class="title" x-text="t('bench.emptyTitle')"></div>
          <div x-text="t('bench.emptyHint')"></div>
        </div>
      </template>

      <!-- 压测结果对比:任选两条 run(行内"对比"按钮),A=基准,Δ=B 相对 A -->
      <template x-if="cmpRuns()">
        <div class="chart-card" style="margin-bottom: 14px;">
          <div class="head" style="margin-bottom: 10px;">
            <h3><span x-text="t('bench.compareTitle')"></span> <span style="color: var(--muted-2); font-weight: 400; font-size: 12px;" x-text="t('bench.compareHint')"></span></h3>
            <button class="btn" @click="cmpSel = []" x-text="t('bench.clearCompare')"></button>
          </div>
          <div style="display: flex; gap: 18px; flex-wrap: wrap; margin-bottom: 10px; font-size: 12px;">
            <span><strong style="color: var(--indigo);" x-text="t('cleanup.aBaseline')"></strong> <span x-text="cmpRuns()[0].scenario_name"></span> · <code style="font-size: 11px;" x-text="cmpRuns()[0].run_id"></code> · <span style="color: var(--muted);" x-text="cmpScenario(cmpRuns()[0])"></span></span>
            <span><strong style="color: var(--teal);">B</strong> <span x-text="cmpRuns()[1].scenario_name"></span> · <code style="font-size: 11px;" x-text="cmpRuns()[1].run_id"></code> · <span style="color: var(--muted);" x-text="cmpScenario(cmpRuns()[1])"></span></span>
          </div>
          <!-- 指标卡网格:每指标 A/B 双横条(按本指标 max 归一)+ Δ% 徽标 -->
          <div class="cmp-grid">
            <template x-for="row in cmpTable()" :key="row.label">
              <div class="cmp-block">
                <div class="cmp-block-head">
                  <span class="cmp-metric" x-text="row.label"></span>
                  <span class="cmp-delta" :class="row.good === true ? 'good' : (row.good === false ? 'bad' : '')"
                        x-text="row.pct == null ? '' : ((row.pct > 0 ? '+' : '') + row.pct.toFixed(1) + '%' + (row.good === true ? t('cleanup.deltaBetter') : (row.good === false ? t('cleanup.deltaWorse') : t('cleanup.deltaEven'))))"></span>
                </div>
                <div class="cmp-bar-row">
                  <span class="cmp-ab a">A</span>
                  <div class="cmp-track"><i class="a" :style="`width:${row.barA}%`"></i></div>
                  <b x-text="row.aText"></b>
                </div>
                <div class="cmp-bar-row">
                  <span class="cmp-ab b">B</span>
                  <div class="cmp-track"><i class="b" :style="`width:${row.barB}%`"></i></div>
                  <b x-text="row.bText"></b>
                </div>
              </div>
            </template>
          </div>
        </div>
      </template>

      <div class="bench-runs-list" x-show="runs.length > 0">
        <template x-for="r in runs" :key="r.run_id">
          <div class="bench-run-row" :class="{ expanded: selectedId === r.run_id }"
               @click="toggle(r.run_id)">
            <div class="bench-run-main">
              <div class="bench-run-head">
                <span class="rule-row-name" x-text="r.scenario_name"></span>
                <span class="status-chip" :class="r.status">
                  <span x-show="r.status === 'running'" x-text="t('cleanup.statusRunning')"></span>
                  <span x-show="r.status === 'done'" x-text="t('cleanup.statusDone')"></span>
                  <span x-show="r.status === 'failed'" x-text="t('cleanup.statusFailed')"></span>
                </span>
                <span class="slo-chip" :class="r.slo_status || 'na'"
                      x-show="r.slo_status && r.slo_status !== 'n/a'"
                      x-text="r.slo_status === 'pass' ? t('cleanup.sloPass') : t('cleanup.sloFail')"></span>
                <button class="cmp-pill" :class="{ on: cmpSel.includes(r.run_id) }"
                        @click.stop="toggleCmp(r.run_id)"
                        x-text="cmpSel.includes(r.run_id) ? t('cleanup.compareSlot', {slot: (cmpSel.indexOf(r.run_id) === 0 ? 'A' : 'B')}) : t('cleanup.compare')"></button>
              </div>
              <div class="bench-run-meta">
                <code x-text="r.run_id"></code>
                <span class="meta-sep"></span>
                <span x-text="agoText(r.started_at_ns)"></span>
                <span class="meta-sep" x-show="r.scenario"></span>
                <span x-show="r.scenario" x-text="`concurrency=${r.scenario?.concurrency}, ${r.scenario?.prompt_tokens}/${r.scenario?.output_tokens} tok`"></span>
              </div>
            </div>
            <div class="bench-run-metrics">
              <div class="metric">
                <div class="m-label" x-text="t('bench.metricTtftAvg')"></div>
                <div class="m-value" x-text="fmtMs(r.client_metrics?.ttft_ms?.mean)"></div>
              </div>
              <div class="metric">
                <div class="m-label" x-text="t('bench.metricTpotAvg')"></div>
                <div class="m-value" x-text="fmtMs(r.client_metrics?.tpot_ms?.mean)"></div>
              </div>
              <div class="metric">
                <div class="m-label" x-text="t('bench.metricTokPerSec')"></div>
                <div class="m-value" x-text="fmtTps(r.client_metrics?.output_throughput_tps)"></div>
              </div>
              <div class="metric">
                <div class="m-label" x-text="t('bench.metricOkErr')"></div>
                <div class="m-value">
                  <span x-text="r.client_metrics?.ok ?? '—'"></span>
                  <span class="sep">/</span>
                  <span :style="(r.client_metrics?.errors||0) > 0 ? 'color:var(--rose)' : ''"
                        x-text="r.client_metrics?.errors ?? '—'"></span>
                </div>
              </div>
            </div>
            <div class="bench-run-detail" x-show="selectedId === r.run_id" x-cloak>
              <div x-show="r.error" class="bench-error">
                <strong x-text="t('bench.resultError')"></strong><span x-text="r.error"></span>
              </div>
              <div class="bench-detail-grid">
                <div>
                  <h4 x-text="t('bench.clientMetrics')"></h4>
                  <table class="bench-detail-tab">
                    <tr><td>TTFT</td><td><span x-text="t('common.avg')"></span> <strong x-text="fmtMs(r.client_metrics?.ttft_ms?.mean)"></strong> · p50 <span x-text="fmtMs(r.client_metrics?.ttft_ms?.p50)"></span> / p95 <span x-text="fmtMs(r.client_metrics?.ttft_ms?.p95)"></span> / p99 <span x-text="fmtMs(r.client_metrics?.ttft_ms?.p99)"></span></td></tr>
                    <tr><td>TPOT</td><td><span x-text="t('common.avg')"></span> <strong x-text="fmtMs(r.client_metrics?.tpot_ms?.mean)"></strong> · p50 <span x-text="fmtMs(r.client_metrics?.tpot_ms?.p50)"></span> / p95 <span x-text="fmtMs(r.client_metrics?.tpot_ms?.p95)"></span> / p99 <span x-text="fmtMs(r.client_metrics?.tpot_ms?.p99)"></span></td></tr>
                    <tr><td>E2E</td><td><span x-text="t('common.avg')"></span> <strong x-text="fmtMs(r.client_metrics?.e2e_ms?.mean)"></strong> · p50 <span x-text="fmtMs(r.client_metrics?.e2e_ms?.p50)"></span> / p95 <span x-text="fmtMs(r.client_metrics?.e2e_ms?.p95)"></span> / p99 <span x-text="fmtMs(r.client_metrics?.e2e_ms?.p99)"></span></td></tr>
                    <tr><td>Output</td><td><span x-text="fmtTps(r.client_metrics?.output_throughput_tps)"></span></td></tr>
                    <tr><td>Input</td><td><span x-text="fmtTps(r.client_metrics?.input_throughput_tps)"></span></td></tr>
                    <tr><td>Tokens</td><td>out <span x-text="r.client_metrics?.output_tokens_total ?? '—'"></span> · in <span x-text="r.client_metrics?.input_tokens_total ?? '—'"></span></td></tr>
                  </table>
                </div>
                <div>
                  <h4 x-text="t('bench.scenario')"></h4>
                  <table class="bench-detail-tab">
                    <tr><td>Endpoint</td><td><code x-text="r.scenario?.endpoint"></code></td></tr>
                    <tr><td>Model</td><td><code x-text="r.scenario?.model"></code></td></tr>
                    <tr><td>API</td><td x-text="r.scenario?.api"></td></tr>
                    <tr><td>Prompt / Output</td><td><span x-text="r.scenario?.prompt_tokens"></span> / <span x-text="r.scenario?.output_tokens"></span> tok</td></tr>
                    <tr><td>Concurrency</td><td x-text="r.scenario?.concurrency"></td></tr>
                    <tr><td>Bounded by</td><td>
                      <span x-show="r.scenario?.duration_s" x-text="`duration=${r.scenario?.duration_s}s`"></span>
                      <span x-show="r.scenario?.num_requests" x-text="`requests=${r.scenario?.num_requests}`"></span>
                    </td></tr>
                  </table>
                </div>
              </div>
            </div>
          </div>
        </template>
      </div>
    </div>

  </main>

  <footer>
    <span class="live-dot"></span>pping-lang · <span x-text="t('cleanup.autoRefresh')"></span>
  </footer>
</div>

<script src="/dashboard.js"></script>
</body>
</html>
