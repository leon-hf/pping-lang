<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pping-lang dashboard</title>
<script defer src="/vendor/alpine.min.js"></script>
<script src="/vendor/chart.umd.min.js"></script>
<link rel="stylesheet" href="/dashboard.css">
</head>
<body>

<div x-data="dashboard()" x-init="init()">

  <header>
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
      </div>
      <h1>pping-lang<span class="sub" x-text="t('brand.sub')"></span></h1>
    </div>
    <div class="meta">
      <span class="status-pill"><span class="status-dot"></span>healthy</span>
      <span class="meta-sep"></span>
      <span x-text="health.instance_id || '—'"></span>
      <span class="meta-sep"></span>
      <span>engine <span x-text="health.engine_index ?? '—'"></span></span>
      <span class="meta-sep"></span>
      <span><span x-text="health.rules?.num ?? 0"></span> rules</span>
      <span class="meta-sep"></span>
      <span style="color: var(--muted-2);" x-text="`v${health.version || ''}`"></span>
      <span class="meta-sep"></span>
      <div class="lang-toggle" :title="t('lang.label')">
        <button :class="{ active: $store.i18n.lang === 'zh' }" @click="$store.i18n.lang='zh'; localStorage.setItem('pping_lang_ui','zh')">中</button>
        <button :class="{ active: $store.i18n.lang === 'en' }" @click="$store.i18n.lang='en'; localStorage.setItem('pping_lang_ui','en')">EN</button>
      </div>
      <a class="header-link" href="https://github.com/leon-hf/pping-lang/issues/new" target="_blank" rel="noopener" :title="t('btn.issue')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="12.5"/><circle cx="12" cy="16" r="1.1" fill="currentColor" stroke="none"/></svg>
        <span x-text="t('btn.issue')"></span>
      </a>
      <a class="header-link star" href="https://github.com/leon-hf/pping-lang" target="_blank" rel="noopener" :title="t('btn.star')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        <span x-text="t('btn.star')"></span>
      </a>
    </div>
  </header>

  <nav class="tabs">
    <button :class="{ active: tab === 'live' }" @click="tab = 'live'" x-text="t('nav.live')"></button>
    <button :class="{ active: tab === 'kernel' }" @click="tab = 'kernel'">
      <span x-text="t('nav.kernel')"></span>
      <span x-show="kernels.enabled" class="tab-badge" style="background: var(--teal-soft); color: var(--teal);">CUPTI</span>
    </button>
    <button :class="{ active: tab === 'rules' }" @click="tab = 'rules'">
      <span x-text="t('nav.rules')"></span>
      <span x-show="diagnoses.length > 0" class="tab-badge"
            :class="{ crit: diagnoses.some(d => d.severity === 'critical') }"
            x-text="diagnoses.length"></span>
    </button>
    <button :class="{ active: tab === 'bench' }" @click="tab = 'bench'">
      <span x-text="t('nav.bench')"></span>
      <span x-show="benchRunning > 0" class="tab-badge"
            x-text="benchRunning"></span>
    </button>
  </nav>

  <main>

    <!-- ===== 实时 tab ===== -->
    <div x-show="tab === 'live'">

      <!-- Hero / System info -->
      <div class="hero">
        <div class="hero-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="3"/>
            <path d="M9 9h6v6H9z"/>
            <path d="M9 1v2M15 1v2M9 21v2M15 21v2M1 9h2M1 15h2M21 9h2M21 15h2"/>
          </svg>
        </div>
        <div class="hero-body">
          <div class="hero-eyebrow">currently serving</div>
          <h2 class="hero-title" x-text="system.served_model_name || system.model || '—'"></h2>
          <div class="hero-meta">
            <span class="chip coral" x-show="system.vllm_version">
              <span class="chip-label">vLLM</span>
              <span class="chip-val" x-text="system.vllm_version"></span>
            </span>
            <span class="chip amber" x-show="system.gpu_name">
              <span class="chip-label">GPU</span>
              <span class="chip-val" x-text="system.gpu_name"></span>
            </span>
            <span class="chip indigo" x-show="system.gpu_count">
              <span class="chip-label">Count</span>
              <span class="chip-val" x-text="`× ${system.gpu_count}`"></span>
            </span>
            <span class="chip teal" x-show="system.gpu_peak">
              <span class="chip-label">BF16 Peak</span>
              <span class="chip-val" x-text="system.gpu_peak ? `${system.gpu_peak.bf16_tflops.toFixed(0)} TFLOPS` : ''"></span>
            </span>
            <span class="chip teal" x-show="system.gpu_peak">
              <span class="chip-label">Mem BW</span>
              <span class="chip-val" x-text="system.gpu_peak ? `${(system.gpu_peak.mem_bw_gbs/1000).toFixed(2)} TB/s` : ''"></span>
            </span>
          </div>
        </div>
        <div class="hero-pulse">
          <button class="hero-info-btn" @click="showStartupInfo = true" :title="t('hero.info')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="16" x2="12" y2="12"/>
              <line x1="12" y1="8" x2="12.01" y2="8"/>
            </svg>
            <span x-text="t('startup.btn')"></span>
          </button>
          <div class="label">TTFT p99</div>
          <div class="val"><span x-text="fmt(kpis.ttft_p99_ms, 0)"></span><span class="unit">ms</span></div>
        </div>
      </div>

      <!-- 启动信息 modal -->
      <div x-show="showStartupInfo" x-cloak class="modal-backdrop"
           @click.self="showStartupInfo = false" @keydown.escape.window="showStartupInfo = false">
        <div class="modal" role="dialog" aria-modal="true">
          <div class="modal-head">
            <h2><span x-text="t('startup.title')"></span> · <span x-text="system.instance_id"></span></h2>
            <button class="modal-close" @click="showStartupInfo = false" :aria-label="t('common.close')">×</button>
          </div>
          <div class="modal-body">

            <!-- 启动命令 -->
            <div class="modal-section">
              <div class="section-head-row">
                <h3 x-text="t('startup.cmdline')"></h3>
                <button class="copy-btn" @click="copyCmdline()" x-text="cmdlineCopyLabel || t('common.copy')"></button>
              </div>
              <template x-if="(system.cmdline || []).length === 0">
                <div class="empty" x-text="t('startup.noCmdline')"></div>
              </template>
              <template x-if="(system.cmdline || []).length > 0">
                <pre class="cmdline" x-text="(system.cmdline || []).join(' ')"></pre>
              </template>
            </div>

            <!-- 环境变量 -->
            <div class="modal-section">
              <div class="section-head-row">
                <h3><span x-text="t('startup.env')"></span> <span style="font-weight: 400; text-transform: none; letter-spacing: 0; color: var(--muted-2);" x-text="`(${Object.keys(system.env || {}).length})`"></span></h3>
              </div>
              <template x-if="Object.keys(system.env || {}).length === 0">
                <div class="empty" x-text="t('startup.noEnv')"></div>
              </template>
              <template x-if="Object.keys(system.env || {}).length > 0">
                <table class="kv">
                  <template x-for="key in Object.keys(system.env || {}).sort()" :key="key">
                    <tr>
                      <td x-text="key"></td>
                      <td>
                        <template x-if="system.env[key] === '***'">
                          <span class="masked" :title="t('startup.masked')">***</span>
                        </template>
                        <template x-if="system.env[key] !== '***'">
                          <span x-text="system.env[key]"></span>
                        </template>
                      </td>
                    </tr>
                  </template>
                </table>
              </template>
            </div>

            <!-- 解析配置 -->
            <div class="modal-section">
              <div class="section-head-row">
                <h3><span x-text="t('startup.resolved')"></span> <span style="font-weight: 400; text-transform: none; letter-spacing: 0; color: var(--muted-2);" x-text="t('startup.resolvedSub')"></span></h3>
              </div>
              <template x-if="!system.resolved_config || Object.keys(system.resolved_config).length === 0">
                <div class="empty" x-text="t('startup.noConfig')"></div>
              </template>
              <template x-for="group in Object.keys(system.resolved_config || {}).sort()" :key="group">
                <div class="config-group">
                  <h4 x-text="group"></h4>
                  <table class="kv">
                    <template x-for="k in Object.keys(system.resolved_config[group]).sort()" :key="k">
                      <tr>
                        <td x-text="k"></td>
                        <td x-text="system.resolved_config[group][k] === null ? '—' : String(system.resolved_config[group][k])"></td>
                      </tr>
                    </template>
                  </table>
                </div>
              </template>
            </div>

          </div>
        </div>
      </div>

      <!-- KPI grid — Tier 1: user-facing latency & capacity -->
      <div class="section-head">
        <h2 x-text="t('live.tier1')"></h2>
        <span class="hint" x-text="t('live.tier1hint')"></span>
      </div>

      <div class="kpis">
        <div class="kpi coral" :class="{ warn: kpis.ttft_p99_ms > 1000 && kpis.ttft_p99_ms <= 2000, crit: kpis.ttft_p99_ms > 2000 }"
             :title="t('tip.ttft')">
          <div class="label"><span x-text="t('kpi.ttft')"></span> <span class="kpi-sub-label"><span x-text="t('kpi.ttft.sub')"></span> · <span x-text="kpis.ttft?.n ?? 0"></span> <span x-text="t('kpi.reqs')"></span></span></div>
          <div class="value"><span x-text="fmt(kpis.ttft?.avg, 0)"></span><span class="unit">ms</span></div>
          <div x-show="kpis.ttft && kpis.ttft.p99" :title="t('tip.dist')">
            <div class="pct-rows">
              <div class="pct-row"><span class="pq">p50</span><div class="pr-track"><i :style="`width:${pctW(kpis.ttft,'p50')}%`"></i></div><b x-text="fmt(kpis.ttft?.p50, 0)"></b></div>
              <div class="pct-row"><span class="pq">p95</span><div class="pr-track"><i :style="`width:${pctW(kpis.ttft,'p95')}%`"></i></div><b x-text="fmt(kpis.ttft?.p95, 0)"></b></div>
              <div class="pct-row"><span class="pq">p99</span><div class="pr-track"><i :style="`width:${pctW(kpis.ttft,'p99')}%`"></i></div><b x-text="fmt(kpis.ttft?.p99, 0)"></b></div>
            </div>
          </div>
        </div>
        <div class="kpi rose" :class="{ warn: kpis.tpot_p99_ms > 50 && kpis.tpot_p99_ms <= 100, crit: kpis.tpot_p99_ms > 100 }"
             :title="t('tip.tpot')">
          <div class="label">
            <span x-text="t('kpi.tpot')"></span> <span class="kpi-sub-label" x-text="kpis.tpot_source === 'itl' ? '(ITL fallback)' : t('kpi.tpot.sub')"></span>
          </div>
          <div class="value"><span x-text="fmt(kpis.tpot?.avg, 0)"></span><span class="unit">ms</span></div>
          <div x-show="kpis.tpot && kpis.tpot.p99"
               :title="(kpis.tpot_source === 'itl' ? t('tip.tpotItl') : '') + t('tip.dist')">
            <div class="pct-rows">
              <div class="pct-row"><span class="pq">p50</span><div class="pr-track"><i :style="`width:${pctW(kpis.tpot,'p50')}%`"></i></div><b x-text="fmt(kpis.tpot?.p50, 0)"></b></div>
              <div class="pct-row"><span class="pq">p95</span><div class="pr-track"><i :style="`width:${pctW(kpis.tpot,'p95')}%`"></i></div><b x-text="fmt(kpis.tpot?.p95, 0)"></b></div>
              <div class="pct-row"><span class="pq">p99</span><div class="pr-track"><i :style="`width:${pctW(kpis.tpot,'p99')}%`"></i></div><b x-text="fmt(kpis.tpot?.p99, 0)"></b></div>
            </div>
          </div>
        </div>
        <div class="kpi teal"
             :title="t('tip.tput')">
          <div class="label"><span x-text="t('kpi.tput')"></span> <span class="kpi-sub-label" x-text="t('kpi.tput.sub')"></span></div>
          <div class="value"><span x-text="fmt(kpis.output_tps, 0)"></span><span class="unit">tok/s</span></div>
          <div class="sub-line" x-show="kpis.per_req_decode_tps">
            <span x-text="t('kpi.tput.perreq')"></span> <span x-text="fmt(kpis.per_req_decode_tps, 0)"></span> tok/s
          </div>
        </div>
        <div class="kpi amber" :class="{ warn: kpis.kv_cache > 0.8 && kpis.kv_cache <= 0.9, crit: kpis.kv_cache > 0.9 }"
             :title="t('tip.kv')">
          <div class="label">KV cache</div>
          <div class="value"><span x-text="fmt(kpis.kv_cache * 100, 0)"></span><span class="unit">%</span></div>
        </div>
        <div class="kpi indigo"
             :title="t('tip.running')">
          <div class="label" x-text="t('kpi.running')"></div>
          <div class="value" x-text="fmt(kpis.running_reqs, 0)"></div>
        </div>
        <div class="kpi sage" :class="{ warn: kpis.waiting_reqs > 20 }"
             :title="t('tip.waiting')">
          <div class="label" x-text="t('kpi.waiting')"></div>
          <div class="value" x-text="fmt(kpis.waiting_reqs, 0)"></div>
        </div>
      </div>

      <!-- KPI grid — Tier 2: efficiency & diagnostics -->
      <div class="section-head" style="margin-top: 28px;">
        <h2 style="font-size: 16px;" x-text="t('live.tier2')"></h2>
      </div>

      <div class="kpis">
        <div class="kpi teal" :class="{ warn: kpis.mfu > 0 && kpis.mfu < 0.2 }"
             :title="t('tip.mfu')">
          <div class="label"><span x-text="t('kpi.mfu')"></span> <span class="kpi-sub-label" x-text="t('kpi.mfu.sub')"></span></div>
          <div class="value"><span x-text="fmt(kpis.mfu * 100, 0)"></span><span class="unit">%</span></div>
        </div>
        <div class="kpi indigo" :class="{ warn: kpis.gpu_util !== null && kpis.gpu_util < 30 }"
             :title="t('tip.gpuutil')">
          <div class="label"><span x-text="t('kpi.gpuutil')"></span> <span class="kpi-sub-label" x-text="t('kpi.gpuutil.sub')"></span></div>
          <div class="value"><span x-text="fmt(kpis.gpu_util, 0)"></span><span class="unit">%</span></div>
        </div>
        <div class="kpi rose" :class="{ warn: kpis.gpu_mem_used_pct > 85 && kpis.gpu_mem_used_pct <= 95, crit: kpis.gpu_mem_used_pct > 95 }"
             :title="t('tip.vram')">
          <div class="label"><span x-text="t('kpi.vram')"></span> <span class="kpi-sub-label" x-text="t('kpi.vram.sub')"></span></div>
          <div class="value"><span x-text="fmt(kpis.gpu_mem_used_pct, 0)"></span><span class="unit">%</span></div>
        </div>
        <div class="kpi sage" :class="{ warn: kpis.prefix_cache_hit !== null && kpis.prefix_cache_hit < 0.1 }"
             :title="t('tip.prefix')">
          <div class="label" x-text="t('kpi.prefix')"></div>
          <div class="value"><span x-text="fmt(kpis.prefix_cache_hit * 100, 0)"></span><span class="unit">%</span></div>
        </div>
        <div class="kpi amber" :class="{ warn: kpis.padding_ratio > 0.3 }"
             :title="t('tip.padding')">
          <div class="label">CUDA padding</div>
          <div class="value"><span x-text="fmt(kpis.padding_ratio * 100, 0)"></span><span class="unit">%</span></div>
        </div>
        <div class="kpi coral" :class="{ warn: kpis.preempt_per_min > 0 && kpis.preempt_per_min <= 5, crit: kpis.preempt_per_min > 5 }"
             :title="t('tip.preempt')">
          <div class="label" x-text="t('kpi.preempt')"></div>
          <div class="value" x-text="fmt(kpis.preempt_per_min, 1)"></div>
        </div>
      </div>

      <!-- Latency trends (TTFT / TPOT / E2E) -->
      <div class="section-head" style="margin-top: 28px;">
        <h2 style="font-size: 16px;" x-text="t('live.latTrends')"></h2>
        <span class="hint" x-text="t('live.latHint')"></span>
      </div>

      <div class="latency-trends">
        <div class="lat-card">
          <div class="lat-head">
            <span class="lat-title" x-text="t('lat.ttft')"></span>
            <span class="lat-now">
              <span class="label-p" x-text="t('common.avg')"></span>
              <span x-text="fmt(kpis.ttft?.avg, 0)"></span><span class="unit">ms</span>
            </span>
          </div>
          <div class="lat-chart" x-show="ttftHasData"><canvas id="ttft-chart"></canvas></div>
          <div class="lat-empty" x-show="!ttftHasData" x-text="t('lat.noTtft')"></div>
        </div>

        <div class="lat-card">
          <div class="lat-head">
            <span class="lat-title" x-text="t('lat.tpot')"></span>
            <span class="lat-now">
              <span class="label-p" x-text="t('common.avg')"></span>
              <span x-text="fmt(kpis.tpot?.avg, 0)"></span><span class="unit">ms</span>
            </span>
          </div>
          <div class="lat-source" x-show="tpotSource === 'itl'" x-text="t('lat.itlSource')"></div>
          <div class="lat-chart" x-show="tpotHasData"><canvas id="tpot-chart"></canvas></div>
          <div class="lat-empty" x-show="!tpotHasData" x-text="t('lat.noTpot')"></div>
        </div>

        <div class="lat-card">
          <div class="lat-head">
            <span class="lat-title" x-text="t('lat.e2e')"></span>
            <span class="lat-now" x-show="e2eHasData">
              <span class="label-p" x-text="t('common.avg')"></span>
              <span x-text="fmt(e2eAvg, 0)"></span><span class="unit">ms</span>
            </span>
            <span class="lat-now" x-show="!e2eHasData" style="color: var(--muted-2);">—</span>
          </div>
          <div class="lat-chart" x-show="e2eHasData"><canvas id="e2e-chart"></canvas></div>
          <div class="lat-empty" x-show="!e2eHasData"><span x-text="t('lat.noE2e')"></span><br/><span x-text="t('lat.noE2eHint')"></span></div>
        </div>
      </div>

      <!-- Chart: Roofline (compute / memory bound diagnosis) -->
      <div class="chart-card">
        <div class="head">
          <div>
            <h3 x-text="t('roof.title')"></h3>
            <div style="margin-top: 4px; font-size: 11.5px; color: var(--muted-2);" x-text="t('roof.desc')"></div>
            <div x-show="rooflineSource === 'analytical'"
                 style="margin-top: 6px; padding: 6px 10px; background: rgba(217, 119, 6, 0.08); border-left: 3px solid var(--amber); border-radius: 3px; font-size: 11px; color: var(--text);"
                 :title="rooflineFormula">
              <span x-text="t('roof.estimate', { b: rooflineParamsB })"></span>
              <span style="color: var(--muted-2);" x-text="t('roof.estimateNote')"></span>
            </div>
          </div>
          <div style="display: flex; gap: 14px; align-items: center; flex-wrap: wrap;">
            <span style="display: inline-flex; align-items: center; gap: 6px; font-size: 11.5px; color: var(--muted);">
              <span style="width: 14px; height: 2.5px; background: var(--rose); border-radius: 2px;"></span>
              Compute roof
            </span>
            <span style="display: inline-flex; align-items: center; gap: 6px; font-size: 11.5px; color: var(--muted);">
              <span style="width: 14px; height: 2.5px; background: var(--indigo); border-radius: 2px;"></span>
              Memory roof
            </span>
            <span style="display: inline-flex; align-items: center; gap: 6px; font-size: 11.5px; color: var(--muted);">
              <span style="width: 8px; height: 8px; background: var(--teal); border-radius: 50%;"></span>
              <span x-text="t('roof.sample')"></span>
            </span>
          </div>
        </div>
        <div class="chart-wrap" style="height: 300px;"><canvas id="gpu-chart"></canvas></div>

        <!-- Plain-language interpretation of the chart -->
        <template x-if="rooflineVerdict">
          <div class="roofline-verdict" :class="rooflineVerdict.bound === 'memory' ? 'mem' : 'cmp'">
            <div class="rv-headline">
              <span class="rv-tag" x-text="t('roof.verdict')"></span>
              <span class="rv-text" x-text="rooflineVerdict.headline"></span>
            </div>
            <div class="rv-bars">
              <div class="rv-bar-row">
                <span class="rv-bar-label" x-text="t('roof.computeUtil')"></span>
                <div class="rv-bar-track">
                  <div class="rv-bar-fill rv-bar-compute"
                       :style="`width: ${Math.min(100, rooflineVerdict.computeUtil * 100).toFixed(1)}%`"></div>
                </div>
                <span class="rv-bar-val">
                  <span x-text="(rooflineVerdict.computeUtil * 100).toFixed(0)"></span>%
                  <span class="rv-bar-detail">
                    （<span x-text="fmt(rooflineVerdict.medTput, 2)"></span>
                    / <span x-text="fmt(rooflineVerdict.peakC, 0)"></span> TFLOPS）
                  </span>
                </span>
              </div>
              <div class="rv-bar-row">
                <span class="rv-bar-label" x-text="t('roof.bwUtil')"></span>
                <div class="rv-bar-track">
                  <div class="rv-bar-fill rv-bar-memory"
                       :style="`width: ${Math.min(100, rooflineVerdict.bwUtil * 100).toFixed(1)}%`"></div>
                </div>
                <span class="rv-bar-val">
                  <span x-text="(rooflineVerdict.bwUtil * 100).toFixed(0)"></span>%
                  <span class="rv-bar-detail">
                    （<span x-text="fmt(rooflineVerdict.medTput / rooflineVerdict.medAI * 1000, 0)"></span>
                    / <span x-text="(rooflineVerdict.peakBW * 1000).toFixed(0)"></span> GB/s）
                  </span>
                </span>
              </div>
            </div>
            <div class="rv-suggest">
              <div class="rv-suggest-title" x-text="t('roof.speedup')"></div>
              <ul>
                <template x-for="(s, i) in rooflineVerdict.suggestions" :key="i">
                  <li x-text="s"></li>
                </template>
              </ul>
            </div>
            <div class="rv-foot" :title="t('roof.footTip', { n: rooflineVerdict.n, ai: rooflineVerdict.medAI.toFixed(2), knee: rooflineVerdict.knee.toFixed(0) })">
              <span x-text="t('roof.foot', { ai: rooflineVerdict.medAI.toFixed(2), knee: rooflineVerdict.knee.toFixed(0), n: rooflineVerdict.n })"></span>
              <span x-show="rooflineVerdict.medAI < rooflineVerdict.knee" style="color: var(--indigo);" x-text="' · ' + t('roof.inMemBound')"></span>
              <span x-show="rooflineVerdict.medAI >= rooflineVerdict.knee" style="color: var(--rose);" x-text="' · ' + t('roof.inCmpBound')"></span>
            </div>
          </div>
        </template>

        <template x-if="!rooflineVerdict">
          <div class="roofline-verdict empty">
            <span x-text="t('roof.noSamples')"></span>
          </div>
        </template>
      </div>

    </div>

    <!-- ===== Kernel tab (CUPTI 阶段 1a) ===== -->
    <div x-show="tab === 'kernel'">
      <div class="section-head" style="margin-top: 0;">
        <h2 x-text="t('kern.profileTitle')"><span class="hint" style="margin-left: 10px;" x-text="t('kern.profileHint')"></span></h2>
      </div>

      <!-- Roofline(模型级,与 Overview 同数据)— 宏观定位:整模型在屋脊线哪、离峰值多远 -->
      <div class="chart-card" style="margin-bottom: 18px;">
        <div class="head">
          <div>
            <h3 x-text="t('kern.rooflineTitle')"><span style="color: var(--muted-2); font-weight: 400; font-size: 12px;" x-text="t('kern.rooflineSubtitle')"></span></h3>
            <div style="margin-top: 4px; font-size: 11.5px; color: var(--muted-2);" x-text="t('kern.rooflineHint')"></div>
          </div>
          <div style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap; font-size: 11px; color: var(--muted);">
            <span style="display: inline-flex; align-items: center; gap: 5px;"><span style="width:13px;height:2.5px;background:var(--rose);border-radius:2px;"></span>Compute roof</span>
            <span style="display: inline-flex; align-items: center; gap: 5px;"><span style="width:13px;height:2.5px;background:var(--indigo);border-radius:2px;"></span>Memory roof</span>
            <span style="display: inline-flex; align-items: center; gap: 5px;"><span style="width:8px;height:8px;background:var(--teal);border-radius:50%;"></span><span x-text="t('roof.sample')"></span></span>
          </div>
        </div>
        <div class="chart-wrap" style="height: 260px;"><canvas id="kernel-roofline-chart"></canvas></div>
        <!-- 屋脊线怎么算的:两个峰值参数 + 拐点 -->
        <template x-if="system.gpu_peak">
          <div style="margin-top: 10px; padding: 9px 13px; background: var(--surface-alt); border-radius: 8px; font-size: 11.5px; color: var(--muted); line-height: 1.75;">
            <strong style="color: var(--text); font-weight: 600;" x-text="t('kern.howComputed')"></strong>（<span x-text="system.gpu_name || 'GPU'"></span> · <span x-text="t('kern.rooflineFrom')"></span>）·
            <span style="color: var(--rose); font-weight: 600;">Compute roof</span> = <strong x-text="system.gpu_peak.bf16_tflops.toFixed(0)"></strong> <span x-text="t('cleanup.computeRoofFormula')"></span> ·
            <span style="color: var(--indigo); font-weight: 600;">Memory roof</span> = <strong x-text="system.gpu_peak.mem_bw_gbs.toFixed(0)"></strong> <span x-text="t('cleanup.memoryRoofFormula')"></span> ·
            <span x-text="t('cleanup.knee')"></span> = <strong x-text="(system.gpu_peak.bf16_tflops / system.gpu_peak.mem_bw_gbs * 1000).toFixed(0)"></strong> FLOP/byte
            <span style="color: var(--muted-2);" x-text="t('kern.kneeDesc')"></span>
          </div>
        </template>
        <!-- Scaling 分析:decode AI≈batch,沿 envelope 外推扩 batch 的吞吐上界 -->
        <template x-if="rooflineScale">
          <div style="margin-top: 10px; padding: 11px 14px; background: var(--teal-soft); border-radius: 8px; font-size: 12px; color: var(--text); line-height: 1.8;">
            <strong x-text="t('kern.scalingAnalysis')"></strong>
          </div>
        </template>
        <!-- P0-C:实测 scaling 闭环 —— 一键压测扫并发,实测曲线叠在 envelope 上,外推变实测 -->
        <div style="margin-top: 10px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;">
          <button class="btn" :disabled="scalingSweep.running" @click="startScalingSweep()">
            <span x-show="!scalingSweep.running" x-text="t('kern.scalingSweepBtn')"></span>
            <span x-show="scalingSweep.running" x-text="'⏳ ' + (scalingSweep.progress || t('kern.scalingSweepInProgress'))"></span>
          </button>
          <span x-show="scalingSweep.running" style="font-size: 11.5px; color: var(--muted-2);" x-text="t('kern.scalingSweepNote')"></span>
          <span x-show="scalingSweep.error" style="font-size: 12px; color: var(--rose);" x-text="t('kern.scalingSweepError', {err: scalingSweep.error})"></span>
        </div>
        <template x-if="scalingSweep.verdict">
          <div style="margin-top: 10px; padding: 12px 14px; border-radius: 8px; border: 1px solid var(--border-strong); border-left: 3px solid var(--teal); background: var(--surface-tint); font-size: 12px; color: var(--text); line-height: 1.8;">
            <strong x-text="t('kern.scalingVerdict')"></strong>(<span x-text="t('kern.verdictChart')"></span>)<br>
            <span x-text="scalingSweep.verdict.text"></span>
            <div style="margin-top: 7px; display: flex; gap: 14px; flex-wrap: wrap;">
              <template x-for="(r, ri) in scalingSweep.verdict.rows" :key="r.b">
                <span style="font-variant-numeric: tabular-nums; font-size: 11.5px;"
                      :style="(ri > 0 && r.eff_pct != null && r.eff_pct < 70) ? 'color: var(--rose); font-weight: 600;' : 'color: var(--muted);'">
                  B=<span x-text="r.b"></span>: <span x-text="fmt(r.tflops, 2)"></span> TFLOPs/s<span x-show="ri > 0 && r.eff_pct != null"><span x-text="t('cleanup.scalingEff', {pct: fmt(r.eff_pct, 0)})"></span></span>
                </span>
              </template>
            </div>
          </div>
        </template>
        <template x-if="rooflineVerdict">
          <div class="roofline-verdict" :class="rooflineVerdict.bound === 'memory' ? 'mem' : 'cmp'">
            <div class="rv-headline">
              <span class="rv-tag" x-text="t('roof.verdict')"></span>
              <span class="rv-text" x-text="rooflineVerdict.headline"></span>
            </div>
            <div class="rv-bars">
              <div class="rv-bar-row">
                <span class="rv-bar-label" x-text="t('roof.computeUtil')"></span>
                <div class="rv-bar-track"><div class="rv-bar-fill rv-bar-compute" :style="`width: ${Math.min(100, rooflineVerdict.computeUtil * 100).toFixed(1)}%`"></div></div>
                <span class="rv-bar-val"><span x-text="(rooflineVerdict.computeUtil * 100).toFixed(0)"></span>%</span>
              </div>
              <div class="rv-bar-row">
                <span class="rv-bar-label" x-text="t('roof.bwUtil')"></span>
                <div class="rv-bar-track"><div class="rv-bar-fill rv-bar-memory" :style="`width: ${Math.min(100, rooflineVerdict.bwUtil * 100).toFixed(1)}%`"></div></div>
                <span class="rv-bar-val"><span x-text="(rooflineVerdict.bwUtil * 100).toFixed(0)"></span>%</span>
              </div>
            </div>
          </div>
        </template>
      </div>

      <!-- Activity(精确 μs)模式未开 → 用 PC Sampling 采样数据给"每 kernel 的 GPU 时间占比 + 主导 stall" -->
      <template x-if="!kernels.enabled && deep.result && deep.result.available && deep.result.kernel_table && deep.result.kernel_table.length">
        <div class="chart-card">
          <div class="head">
            <div>
              <h3 x-text="t('kern.kernelTimePct')"><span style="color: var(--muted-2); font-weight: 400; font-size: 13px; margin-left: 8px;" x-text="t('kern.kernelSampling')"></span></h3>
              <div style="margin-top: 4px; font-size: 11.5px; color: var(--muted-2);" x-text="t('kern.kernelHint', {n: fmt(deep.result.sample_total, 0)})"></div>
            </div>
            <button class="btn" :disabled="deep.running" @click="runDeepEvidence(5)">
              <span x-show="!deep.running" x-text="t('kern.recollect')"></span><span x-show="deep.running" x-text="t('kern.collecting')"></span>
            </button>
          </div>
          <!-- 按算子类型聚合的 GPU 时间占比(gemm / attention / comm / norm / …) -->
          <div x-show="deep.result.kernel_class_shares && deep.result.kernel_class_shares.length" style="margin-top: 14px;">
            <div style="font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 8px;" x-text="t('kern.byKernelClass')"></div>
            <div style="display: flex; flex-wrap: wrap; gap: 8px 12px;">
              <template x-for="cs in deep.result.kernel_class_shares.filter(x => x.time_pct >= 0.05)" :key="cs.cls">
                <span style="display: inline-flex; align-items: center; gap: 6px; padding: 4px 11px; border-radius: 999px; background: var(--surface-alt); font-size: 12px;">
                  <span :style="`width:9px;height:9px;border-radius:2px;background:${kernelColor(cs.cls)}`"></span>
                  <span x-text="kernelLabel(cs.cls)"></span>
                  <strong style="font-variant-numeric: tabular-nums;" x-text="fmt(cs.time_pct, 1) + '%'"></strong>
                </span>
              </template>
            </div>
          </div>
          <!-- #1+#2+#3 诊断头条:GPU 在等多少 · 什么瓶颈 · 最大可回收点 -->
          <template x-if="issuedVerdict() && bottleneckVerdict()">
            <div style="margin-top: 16px; padding: 14px 16px; border-radius: 10px; border: 1px solid var(--border-strong); border-left: 3px solid var(--teal); background: var(--surface-tint);">
              <div style="display: flex; align-items: center; gap: 10px; flex-wrap: wrap;">
                <span style="font-size: 13px; font-weight: 700; color: var(--text-strong);" x-text="t('kern.gpuUtilDiag')"></span>
                <span style="font-size: 12.5px; color: var(--text);" x-text="t('kern.stallDesc', {stall: fmt(issuedVerdict().stall, 0), issued: fmt(issuedVerdict().issued, 0)})"></span>
              </div>
              <div style="display: flex; height: 14px; border-radius: 4px; overflow: hidden; margin: 10px 0; background: #e9ebee;">
                <div :style="`width:${issuedVerdict().issued}%;background:var(--teal)`" :title="t('cleanup.issuedTitle', {pct: fmt(issuedVerdict().issued,0)})"></div>
                <div :style="`width:${issuedVerdict().stall}%;background:${stallColor(bottleneckVerdict().cls)}`" :title="t('cleanup.stallTitle', {pct: fmt(issuedVerdict().stall,0)})"></div>
              </div>
              <div style="font-size: 13px; color: var(--text);">
                <span x-text="t('cleanup.mainCause')"></span> <strong :style="`color:${stallColor(bottleneckVerdict().cls)}`" x-text="stallLabel(bottleneckVerdict().cls)"></strong><span x-text="t('cleanup.ofStall', {pct: fmt(bottleneckVerdict().pct, 0)})"></span> →
                <strong style="color: var(--text-strong);" x-text="bottleneckVerdict().type"></strong>
              </div>
              <div x-show="bottleneckVerdict().action" style="margin-top: 5px; font-size: 12px; color: var(--muted);" x-text="'💡 ' + bottleneckVerdict().action"></div>
              <template x-if="topRecoverable() && topRecoverable().pct >= 1">
                <div style="margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border);">
                  <span style="font-size: 12.5px; color: var(--text);">
                    <span x-text="t('cleanup.topRecoverablePre')"></span><strong x-text="kernelFriendly(topRecoverable().k.kernel, topRecoverable().k.cls)"></strong>
                    <span x-text="t('cleanup.topRecoverableMid')"></span> <strong style="color: var(--text-strong);" x-text="fmt(topRecoverable().pct, 0) + '%'"></strong> <span x-text="t('cleanup.topRecoverablePost')"></span>
                  </span>
                </div>
              </template>
            </div>
          </template>

          <!-- P3 源码级热点:能定位到 Python 行的 kernel(差异化能力,提到顶部免得埋在长表里)-->
          <template x-if="sourceHotspots().length">
            <div style="margin-top: 16px; padding: 14px 16px; border-radius: 10px; border: 1px solid var(--border-strong); border-left: 3px solid var(--indigo); background: var(--surface-tint);">
              <div style="display: flex; align-items: center; gap: 9px; flex-wrap: wrap; margin-bottom: 4px;">
                <span style="font-size: 13px; font-weight: 700; color: var(--text-strong);" x-text="t('kern.sourceHotspots')"></span>
                <span style="font-size: 12px; color: var(--muted);" x-text="t('kern.sourceDesc')"></span>
              </div>
              <div style="font-size: 11.5px; color: var(--muted-2); margin-bottom: 11px;">
                <span x-show="sourceHotspotsTimePct() < 20" x-text="t('kern.sourceTimePct', {pct: fmt(sourceHotspotsTimePct(), 1)})"></span>
                <span x-show="sourceHotspotsTimePct() >= 20" x-text="t('kern.sourceTimePctHigh')"></span>
              </div>
              <template x-for="h in sourceHotspots()" :key="h.kernel">
                <div style="margin-bottom: 12px;">
                  <div style="display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; margin-bottom: 6px;">
                    <span style="font-family: var(--mono, ui-monospace, monospace); font-size: 12px; color: var(--text-strong); font-weight: 600;" x-text="kernelFriendly(h.kernel, 'index')"></span>
                    <span style="font-size: 11px; color: var(--muted-2);" x-text="h.decode || ''"></span>
                  </div>
                  <template x-for="ln in h.lines" :key="ln.loc">
                    <div style="margin-bottom: 5px;">
                      <div style="display: flex; align-items: center; gap: 8px;">
                        <div style="flex: 1; font-size: 11.5px; font-family: var(--mono, ui-monospace, monospace); color: var(--indigo);" x-text="ln.loc"></div>
                        <div style="width: 120px; background: #e9ebee; border-radius: 3px; height: 11px; overflow: hidden;">
                          <div :style="`width:${Math.min(100, ln.pct)}%;height:100%;background:var(--indigo)`"></div>
                        </div>
                        <div style="width: 44px; text-align: right; font-size: 11px; font-variant-numeric: tabular-nums; color: var(--muted);" x-text="fmt(ln.pct, 1) + '%'"></div>
                      </div>
                      <div x-show="ln.code" style="margin-top: 3px; padding: 5px 10px; background: var(--surface-alt); border: 1px solid var(--border); border-radius: 5px; overflow-x: auto;">
                        <code style="font-family: var(--mono, ui-monospace, monospace); font-size: 11.5px; color: var(--text); white-space: pre;"><span style="color: var(--muted-2); user-select: none;" x-text="ln.line + ' │ '"></span><span x-text="ln.code"></span></code>
                      </div>
                    </div>
                  </template>
                  <div style="font-size: 10.5px; color: var(--muted-2); margin-top: 2px;" x-text="(h.lines[0] && h.lines[0].path) || ''"></div>
                </div>
              </template>
            </div>
          </template>

          <div style="font-size: 11px; color: var(--muted-2); margin-top: 16px;" x-text="t('kern.expandKernelDetail')"></div>
          <div style="overflow-x: auto; margin-top: 8px;">
            <table class="kernel-table">
              <thead>
                <tr>
                  <th style="width: 34%;">Kernel</th>
                  <th x-text="t('kern.kernelClass')"></th>
                  <th style="text-align: right; width: 148px;" x-text="t('kern.kernelGpuTime')"></th>
                  <th style="text-align: right; width: 156px;" x-text="t('kern.kernelStallRecoverable')"></th>
                  <th x-text="t('cleanup.dominantStall')"></th>
                  <th style="width: 26px;"></th>
                </tr>
              </thead>
              <template x-for="(k, i) in (kernelShowAll ? deep.result.kernel_table : deep.result.kernel_table.slice(0, kernelCollapsed))" :key="i">
                <tbody>
                  <tr @click="kernelExpanded = (kernelExpanded === i ? null : i)" style="cursor: pointer;">
                    <td>
                      <div style="font-weight: 600; color: var(--text-strong); font-size: 12.5px;" x-text="kernelFriendly(k.kernel, k.cls)"></div>
                      <code class="kname" style="font-size: 10.5px; color: var(--muted-2);" x-text="k.kernel" :title="k.kernel"></code>
                    </td>
                    <td><span class="kcls" :style="`background:${kernelColor(k.cls)}1a;color:${kernelColor(k.cls)}`" x-text="kernelLabel(k.cls)"></span></td>
                    <td style="text-align: right;">
                      <div style="display: flex; align-items: center; gap: 7px; justify-content: flex-end;">
                        <div style="width: 78px; background: #e9ebee; border-radius: 4px; height: 11px; overflow: hidden;">
                          <div :style="`width:${Math.min(100, k.time_pct)}%;height:100%;background:var(--teal)`"></div>
                        </div>
                        <span style="font-weight: 600; min-width: 42px; font-variant-numeric: tabular-nums;" x-text="fmt(k.time_pct, 1) + '%'"></span>
                      </div>
                    </td>
                    <td style="text-align: right;">
                      <div style="display: flex; align-items: center; gap: 7px; justify-content: flex-end;">
                        <div style="width: 78px; background: #e9ebee; border-radius: 4px; height: 11px; overflow: hidden;">
                          <div :style="`width:${Math.min(100, kernelStallTimePct(k))}%;height:100%;background:${stallColor(k.dominant_stall)}`"></div>
                        </div>
                        <span style="font-weight: 600; min-width: 42px; font-variant-numeric: tabular-nums; color: var(--text);" x-text="fmt(kernelStallTimePct(k), 1) + '%'"></span>
                      </div>
                    </td>
                    <td>
                      <span :style="`color:${stallColor(k.dominant_stall)};font-weight:600`" x-text="stallLabel(k.dominant_stall)"></span>
                      <span style="color: var(--muted-2); font-size: 11px;" x-text="fmt(k.dominant_pct, 0) + '%'"></span>
                    </td>
                    <td style="text-align: center; color: var(--muted-2);" x-text="kernelExpanded === i ? '▴' : '▾'"></td>
                  </tr>
                  <tr x-show="kernelExpanded === i">
                    <td colspan="6" style="background: var(--surface-alt);">
                      <div style="padding: 11px 8px;">
                        <div style="font-size: 11px; font-weight: 600; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.04em;" x-text="t('kern.kernelStallTitle')"></div>
                        <div style="display: flex; flex-direction: column; gap: 4px; max-width: 580px;">
                          <template x-for="ent in Object.entries(k.breakdown || {}).filter(e => e[0] !== 'issued' && e[1] > 0).sort((a, b) => b[1] - a[1]).slice(0, 9)" :key="ent[0]">
                            <div style="display: flex; align-items: center; gap: 8px;">
                              <div style="width: 130px; font-size: 11.5px; color: var(--muted);" x-text="stallLabel(ent[0])"></div>
                              <div style="flex: 1; background: #e9ebee; border-radius: 3px; height: 12px; overflow: hidden;">
                                <div :style="`width:${Math.min(100, 100 * ent[1] / k.samples)}%;height:100%;background:${stallColor(ent[0])}`"></div>
                              </div>
                              <div style="width: 46px; text-align: right; font-size: 11px; font-variant-numeric: tabular-nums;" x-text="fmt(100 * ent[1] / k.samples, 1) + '%'"></div>
                            </div>
                          </template>
                        </div>
                        <div x-show="kernelSuggestion(k)" style="margin-top: 11px; padding: 9px 12px; background: var(--teal-soft); border-radius: 7px; font-size: 12px; color: var(--text);" x-text="'💡 ' + kernelSuggestion(k)"></div>
                        <!-- P3 最深热点:双轨(源码行 / SASS 偏移 + kernel 名解码)-->
                        <template x-if="kernelHotspot(k)">
                          <div style="margin-top: 11px;">
                            <div style="font-size: 11px; font-weight: 600; color: var(--muted); margin-bottom: 7px; text-transform: uppercase; letter-spacing: 0.04em;" x-text="t('kern.kernelDeepHotspot')"><span style="font-weight: 400; text-transform: none; color: var(--muted-2);">· <span x-text="t('kern.kernelHotspotDesc')"></span></span></div>
                            <!-- 轨一:可映射 → Python 源码行(行号 + 占比条 + 该行代码原文)-->
                            <template x-if="kernelHotspot(k).mappable && kernelHotspot(k).lines.length">
                              <div style="display: flex; flex-direction: column; gap: 9px; max-width: 640px;">
                                <template x-for="ln in kernelHotspot(k).lines" :key="ln.loc">
                                  <div>
                                    <div style="display: flex; align-items: center; gap: 8px;">
                                      <div style="flex: 1; font-size: 11.5px; font-family: var(--mono, ui-monospace, monospace); color: var(--indigo);" x-text="ln.loc"></div>
                                      <div style="width: 140px; background: #e9ebee; border-radius: 3px; height: 12px; overflow: hidden;">
                                        <div :style="`width:${Math.min(100, ln.pct)}%;height:100%;background:var(--indigo)`"></div>
                                      </div>
                                      <div style="width: 46px; text-align: right; font-size: 11px; font-variant-numeric: tabular-nums;" x-text="fmt(ln.pct, 1) + '%'"></div>
                                    </div>
                                    <!-- 该行 Python 源码原文(浅色代码块,GitHub-light 风)-->
                                    <div x-show="ln.code" style="margin-top: 3px; padding: 5px 10px; background: var(--surface-alt); border: 1px solid var(--border); border-radius: 5px; overflow-x: auto;">
                                      <code style="font-family: var(--mono, ui-monospace, monospace); font-size: 11.5px; color: var(--text); white-space: pre;"><span style="color: var(--muted-2); user-select: none;" x-text="ln.line + ' │ '"></span><span x-text="ln.code"></span></code>
                                    </div>
                                  </div>
                                </template>
                                <div style="font-size: 11px; color: var(--muted-2);" x-text="t('kern.sourceFile', {path: kernelHotspot(k).lines[0].path || ''})"></div>
                              </div>
                            </template>
                            <!-- 轨二:闭源库 → SASS 偏移 + kernel 名解码 -->
                            <template x-if="!kernelHotspot(k).mappable">
                              <div style="font-size: 12px; color: var(--text); line-height: 1.7;">
                                <span x-show="kernelHotspot(k).decode" style="display: inline-block; padding: 2px 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 5px; font-size: 11.5px; margin-bottom: 6px;" x-text="kernelHotspot(k).decode"></span>
                                <div style="color: var(--muted);" x-text="t('kern.closedLibKernel')" ></div>
                              <div style="color: var(--muted);">
                                  <template x-for="(sp, si) in kernelHotspot(k).sass" :key="si">
                                    <span style="font-family: var(--mono, ui-monospace, monospace);" x-text="(si ? ' · ' : ' ') + sp.offset + ' (' + fmt(sp.pct, 1) + '%)'"></span>
                                  </template>
                                </div>
                                <div style="font-size: 11px; color: var(--muted-2); margin-top: 4px;">
                                  <span x-text="t('cleanup.lineinfoPre')"></span> <code>-lineinfo</code><span x-text="t('cleanup.lineinfoPost')"></span>
                                </div>
                              </div>
                            </template>
                            <!-- launch 栈:向外归因 —— 这个 kernel 从哪段 host 代码启动(闭源 GEMM ← nn.Linear)-->
                            <template x-if="launchFrames(kernelHotspot(k)).length">
                              <div style="margin-top: 9px; padding-top: 9px; border-top: 1px dashed var(--border);">
                                <div style="font-size: 11px; color: var(--muted); margin-bottom: 5px;">
                                  ↗ <strong x-text="t('kern.launchOrigin')"></strong>（<span x-text="t('kern.launchStack')"></span>）
                                </div>
                                <div style="display: flex; flex-wrap: wrap; align-items: center; gap: 4px 2px;">
                                  <template x-for="(fr, fi) in launchFrames(kernelHotspot(k))" :key="fi">
                                    <span style="display: inline-flex; align-items: center; gap: 4px;">
                                      <span x-show="fi" style="color: var(--muted-2);">→</span>
                                      <span :style="`font-family: var(--mono, ui-monospace, monospace); font-size: 11px; padding: 1px 6px; border-radius: 4px; background: var(--surface-alt); ${fi === 0 ? 'color: var(--indigo); font-weight: 600;' : 'color: var(--muted);'}`" x-text="fr"></span>
                                    </span>
                                  </template>
                                </div>
                              </div>
                            </template>
                          </div>
                        </template>
                      </div>
                    </td>
                  </tr>
                </tbody>
              </template>
            </table>
          </div>
          <div x-show="deep.result.kernel_table.length > kernelCollapsed" style="margin-top: 12px; text-align: center;">
            <button class="btn" @click="kernelShowAll = !kernelShowAll"
                    x-text="kernelShowAll ? t('cleanup.collapse') : t('cleanup.showAllKernels', {n: deep.result.kernel_table.length})"></button>
          </div>
          <div style="margin-top: 10px; font-size: 11px; color: var(--muted-2);" x-text="t('kern.preciseMicros')"></div>
        </div>
      </template>

      <!-- 还没有采样数据(自动取证中 / 不可用) -->
      <template x-if="!kernels.enabled && (!deep.result || !deep.result.available || !deep.result.kernel_table || !deep.result.kernel_table.length)">
        <div class="chart-card">
          <div class="roofline-verdict empty" style="margin: 0;">
            <template x-if="deep.running"><span x-text="t('kern.collectingPcSampling')"></span></template>
            <template x-if="!deep.running && deep.error"><span x-text="t('cleanup.pcSamplingUnavailable', {err: deep.error})"></span></template>
            <template x-if="!deep.running && !deep.error"><span x-text="t('kern.noPcSamplingData')"></span></template>
          </div>
        </div>
      </template>

      <template x-if="kernels.enabled">
        <div>
          <!-- 数据新鲜度:这批数据是哪一窗的、多久前采的 -->
          <div x-show="kernels.snapshot_age_s != null" class="kernel-freshness" :class="kernelFresh() ? 'live' : 'stale'">
            <template x-if="kernelFresh()">
              <span>🟢 <span x-text="t('kern.dataFreshness')"></span> · <span x-text="t('kern.aggregated', {w: fmt(kernels.rollup_window_s, 0), when: kernelAgeText()})"></span></span>
            </template>
            <template x-if="!kernelFresh()">
              <span x-text="t('kern.noActivity', {when: kernelAgeText(), w: fmt(kernels.rollup_window_s, 0)})"></span>
            </template>
          </div>

          <!-- 诊断结论:把数字翻译成人话(诊断不止观测) -->
          <div x-show="kernels.findings && kernels.findings.length" style="margin-bottom: 18px;">
            <div style="font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 10px;" x-text="t('kern.findings')"></div>
            <div style="display: flex; flex-direction: column; gap: 9px;">
              <template x-for="(f, i) in kernels.findings" :key="i">
                <div class="kfinding" :class="f.level">
                  <div class="kf-title" x-text="f.title"></div>
                  <div class="kf-detail" x-text="f.detail"></div>
                </div>
              </template>
            </div>
          </div>

          <!-- 概览卡片行 -->
          <div class="kpis" style="margin-bottom: 18px;">
            <div class="kpi teal">
              <div class="label" x-text="t('kern.gpuBusy')"><span class="kpi-sub-label" x-text="t('kern.wallClockShare')"></span></div>
              <div class="value"><span x-text="fmt(kernels.gpu_busy_pct, 1)"></span><span class="unit">%</span></div>
            </div>
            <div class="kpi indigo">
              <div class="label" x-text="t('kern.launchFreq')"></div>
              <div class="value"><span x-text="fmt(kernels.launch_count_per_s, 0)"></span><span class="unit">/s</span></div>
            </div>
            <div class="kpi">
              <div class="label" x-text="t('kern.meanDuration')"></div>
              <div class="value"><span x-text="fmt(kernels.mean_dur_us, 2)"></span><span class="unit">µs</span></div>
            </div>
            <div class="kpi">
              <div class="label" x-text="t('kern.inCudaGraph')"></div>
              <div class="value"><span x-text="fmt(kernels.in_graph_pct, 0)"></span><span class="unit">%</span></div>
            </div>
            <div class="kpi">
              <div class="label"><span x-text="t('kern.memcpy')"></span><span class="kpi-sub-label" x-text="t('kern.wallClockShare')"></span></div>
              <div class="value"><span x-text="fmt(kernels.memcpy_share_pct, 1)"></span><span class="unit">%</span></div>
            </div>
            <div class="kpi">
              <div class="label"><span x-text="t('kern.syncWait')"></span><span class="kpi-sub-label" x-text="t('kern.wallClockShare')"></span></div>
              <div class="value"><span x-text="fmt(kernels.sync_share_pct, 1)"></span><span class="unit">%</span></div>
            </div>
          </div>

          <!-- 实时趋势(秒级,Chart.js)— 这是本项目相对 Nsight/Perfetto 的实时差异化 -->
          <div style="display: grid; grid-template-columns: 3fr 2fr; gap: 16px; margin-bottom: 18px;">
            <div class="chart-card">
              <div class="head"><div>
                <h3 x-text="t('kern.classTrend')"><span style="color: var(--muted-2); font-weight: 400; font-size: 12px;" x-text="t('kern.last3Min')"></span></h3>
                <div style="margin-top: 4px; font-size: 11.5px; color: var(--muted-2);" x-text="t('kern.stackedArea')"></div>
              </div></div>
              <div class="chart-wrap" style="height: 180px; margin-top: 10px;"><canvas id="k-class-chart"></canvas></div>
              <div style="display: flex; flex-wrap: wrap; gap: 6px 14px; margin-top: 8px; font-size: 10.5px; color: var(--muted);">
                <template x-for="c in ['gemm','attention','comm','norm','activation','other']" :key="c">
                  <span style="display: inline-flex; align-items: center; gap: 4px;"><span :style="`width:9px;height:9px;border-radius:2px;background:${kernelColor(c)}`"></span><span x-text="kernelLabel(c)"></span></span>
                </template>
              </div>
            </div>
            <div class="chart-card">
              <div class="head"><div>
                <h3 x-text="t('kern.utilTrend')"></h3>
                <div style="margin-top: 4px; font-size: 11.5px; color: var(--muted-2);" x-text="t('kern.utilNote')"></div>
              </div></div>
              <div class="chart-wrap" style="height: 180px; margin-top: 10px;"><canvas id="k-util-chart"></canvas></div>
            </div>
          </div>

          <!-- 执行时间线(Nsight-style:x=时间,行=stream,块=kernel)-->
          <template x-if="timelineView()">
            <div class="chart-card" style="margin-bottom: 18px;">
              <div class="head">
                <div>
                  <h3 x-text="t('kern.timeline')"><span style="color: var(--muted-2); font-weight: 400; font-size: 12px;" x-text="t('kern.timelineSpan', {n: timelineView().total, span: timelineView().spanMs.toFixed(1)})"></span></h3>
                  <div style="margin-top: 4px; font-size: 11.5px; color: var(--muted-2);" x-text="t('kern.timelineHint')"></div>
                </div>
                <div style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap; font-size: 11px; color: var(--muted);">
                  <template x-for="c in ['gemm','attention','comm','norm','activation','memcpy']" :key="c">
                    <span style="display: inline-flex; align-items: center; gap: 4px;"><span :style="`width:9px;height:9px;border-radius:2px;background:${kernelColor(c)}`"></span><span x-text="kernelLabel(c)"></span></span>
                  </template>
                </div>
              </div>
              <!-- 一行:导出 trace(左) + 实时/冻结/缩放控制(右)-->
              <div style="display: flex; align-items: center; gap: 10px; margin-top: 12px; padding: 9px 13px; background: var(--teal-soft); border: 1px solid color-mix(in srgb, var(--teal) 22%, transparent); border-radius: 8px; font-size: 11.5px; color: var(--text); flex-wrap: wrap;">
                <button class="btn" @click="downloadTrace()" x-text="t('kern.exportTrace')"></button>
                <span style="flex: 1; min-width: 180px; color: var(--muted);" x-text="t('kern.perfettoInst')"></span>
                <button class="btn" @click="tlToggleFreeze()"
                        :style="tlFrozen ? 'background:var(--amber-soft);color:var(--amber);border-color:var(--amber)' : ''"
                        x-text="tlFrozen ? t('cleanup.frozen') : t('cleanup.liveTl')"></button>
                <span style="display: inline-flex; align-items: center; gap: 4px;">
                  <button class="btn" @click="tlZoom(0.5)" :title="t('kern.zoomOut')">−</button>
                  <button class="btn" @click="tlFit()" :title="t('kern.fitWidth')" x-text="t('cleanup.fit')"></button>
                  <button class="btn" @click="tlZoom(2)" :title="t('kern.zoomIn')">＋</button>
                </span>
                <span x-show="tlSelName" style="white-space: nowrap; color: var(--teal); font-weight: 600;" x-text="t('kern.selected', {name: tlSelName.slice(0,28)})"></span>
              </div>
              <!-- 主时间线:左固定 stream 标签 + 右横向滚动条带(放大=内层变宽,平移=滚动)-->
              <div style="display: flex; gap: 8px; margin-top: 12px;">
                <div style="flex: none; width: 60px; padding-top: 0;">
                  <template x-for="s in timelineView().streams" :key="s">
                    <div style="height: 22px; margin-bottom: 5px; line-height: 22px; font-size: 10px; color: var(--muted); text-align: right; font-family: ui-monospace, monospace;">str <span x-text="s"></span></div>
                  </template>
                </div>
                <div id="tl-scroll" style="overflow-x: auto; flex: 1;">
                  <div :style="timelineView().zoomed ? `width:${Math.max(timelineView().innerPx, 100)}px` : 'width:100%'">
                    <template x-for="(s, ri) in timelineView().streams" :key="s">
                      <div style="position: relative; height: 22px; margin-bottom: 5px; background: var(--surface-alt); border-radius: 3px;">
                        <template x-for="(b, i) in timelineView().blocks.filter(x => x.row === ri)" :key="i">
                          <div class="tl-block" :class="{ 'tl-sel': b.idx === tlSelIdx }" @click="tlSelectBlock(b)"
                               :style="`left:${b.leftPx}px;width:${b.widthPx}px;background:${kernelColor(b.cls)}`"
                               :title="`${b.name}  —  ${b.durus.toFixed(1)} µs  [${kernelLabel(b.cls)}]${b.ingraph ? ' · in graph' : ''}`"></div>
                        </template>
                      </div>
                    </template>
                    <div style="position: relative; height: 13px; font-size: 9px; color: var(--muted-2);">
                      <span style="position: absolute; left: 0;">0 ms</span>
                      <span style="position: absolute; right: 0;" x-text="timelineView().spanMs.toFixed(1) + ' ms'"></span>
                    </div>
                  </div>
                </div>
              </div>
              <!-- 选中 kernel 详情 -->
              <template x-if="tlSelectedBlock()">
                <div style="margin-top: 12px; padding: 11px 14px; border: 1px solid var(--border-strong); border-left: 3px solid var(--text-strong); border-radius: 8px; background: var(--surface-tint);">
                  <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 7px;">
                    <span class="kcls" :style="`background:${kernelColor(tlSelectedBlock().cls)}1a;color:${kernelColor(tlSelectedBlock().cls)}`" x-text="kernelLabel(tlSelectedBlock().cls)"></span>
                    <span style="font-weight: 600; font-size: 12.5px; color: var(--text-strong);" x-text="t('kern.selectedDetail')"></span>
                    <button class="btn" style="margin-left: auto; padding: 2px 9px; font-size: 11px;" @click="tlSelIdx = null; tlSelMs = null; tlSelName = ''" x-text="t('kern.deselect')"></button>
                  </div>
                  <code style="display: block; font-family: ui-monospace, Consolas, monospace; font-size: 11.5px; color: var(--text-strong); word-break: break-all; line-height: 1.5; margin-bottom: 9px;" x-text="tlSelectedBlock().name"></code>
                  <div style="display: flex; flex-wrap: wrap; gap: 7px 26px; font-size: 12px; color: var(--muted);">
                    <div><span x-text="t('kern.duration')"></span> <b style="color: var(--text);" x-text="tlSelectedBlock().durus.toFixed(2) + ' µs'"></b></div>
                    <div><span x-text="t('kern.startTime')"></span> <b style="color: var(--text);" x-text="tlSelectedBlock().startMs.toFixed(3) + ' ms'"></b></div>
                    <div><span x-text="t('kern.stream')"></span> <b style="color: var(--text);" x-text="tlSelectedBlock().stream"></b></div>
                    <div><span x-text="t('kern.inGraph')"></span> <b style="color: var(--text);" x-text="tlSelectedBlock().ingraph ? t('kern.yes') : t('kern.no')"></b></div>
                  </div>
                </div>
              </template>
            </div>
          </template>
          <template x-if="!timelineView()">
            <div class="chart-card" style="margin-bottom: 18px;">
              <div class="roofline-verdict empty" style="margin: 0;" x-text="t('cleanup.cuptiTimelineEmpty')"></div>
            </div>
          </template>

          <!-- 原始 per-kernel 明细表(未洗) -->
          <div class="chart-card">
            <div class="head">
              <div><h3 x-text="t('kern.rawKernelDetail')"><span style="color: var(--muted-2); font-weight: 400; font-size: 13px;" :title="t('kern.kernelNameNote')" x-text="t('kern.unique', {n: kernels.top_kernels.length})"></span></h3>
                <div style="margin-top: 4px; font-size: 11.5px; color: var(--muted-2);">
                  <span x-text="t('cleanup.rawKernelPre')"></span> (<code>end−start</code>)<span x-text="t('cleanup.rawKernelPost')"></span> ·
                  <strong x-text="t('kern.allValuesWindow', {w: fmt(kernels.rollup_window_s, 0)})"></strong>
                </div>
              </div>
            </div>
            <div style="overflow-x: auto; margin-top: 12px;">
              <table class="kernel-table">
                <thead>
                  <tr>
                    <th style="width: 44%;" x-text="t('kern.kernelNameRaw')"></th>
                    <th x-text="t('kern.kernelClass')"></th>
                    <th style="text-align: right;" x-text="t('kern.calls')"></th>
                    <th style="text-align: right;" x-text="t('kern.totalTime')"></th>
                    <th style="text-align: right;" x-text="t('kern.average')"></th>
                    <th style="text-align: right;" x-text="t('kern.share')"></th>
                    <th style="text-align: right;" x-text="t('kern.graphShare')"></th>
                  </tr>
                </thead>
                <tbody>
                  <template x-for="(k, i) in (kernelShowAll ? kernels.top_kernels : kernels.top_kernels.slice(0, kernelCollapsed))" :key="i">
                    <tr>
                      <td><code class="kname" x-text="k.name" :title="k.name"></code></td>
                      <td><span class="kcls" :style="`background:${kernelColor(k.cls)}1a;color:${kernelColor(k.cls)}`" x-text="kernelLabel(k.cls)"></span></td>
                      <td style="text-align: right;" x-text="k.count.toLocaleString()"></td>
                      <td style="text-align: right;" x-text="fmt(k.total_ms, 2) + ' ms'"></td>
                      <td style="text-align: right;" x-text="fmt(k.mean_us, 1) + ' µs'"></td>
                      <td style="text-align: right;">
                        <span style="font-weight: 600; color: var(--text);" x-text="fmt(k.pct, 1) + '%'"></span>
                      </td>
                      <td style="text-align: right; color: var(--muted-2);" x-text="fmt(k.in_graph_pct, 0) + '%'"></td>
                    </tr>
                  </template>
                  <template x-if="!kernels.top_kernels.length">
                    <tr><td colspan="7" style="text-align: center; color: var(--muted-2); padding: 18px;" x-text="t('kern.noKernelDetail')"></td></tr>
                  </template>
                </tbody>
              </table>
            </div>
            <!-- 展示更多 / 收起 -->
            <div x-show="kernels.top_kernels.length > kernelCollapsed" style="margin-top: 12px; text-align: center;">
              <button class="btn" @click="kernelShowAll = !kernelShowAll"
                      x-text="kernelShowAll ? t('kern.collapse') : t('kern.showAll', {n: kernels.top_kernels.length})"></button>
            </div>
            <!-- 自我观测 -->
            <div style="margin-top: 12px; font-size: 11px; color: var(--muted-2);">
              <span x-text="t('kern.overhead', {overhead: fmt(kernels.overhead_cb_ms, 3)})"></span>
              <template x-if="kernels.dropped_total"><span x-text="t('kern.dropped', {n: fmt(kernels.dropped_total, 0)})"></span></template>
            </div>
          </div>
        </div>
      </template>

      <!-- ===== Deep Evidence(阶段 2 PC Sampling 按需取证)===== -->
      <div class="chart-card" style="margin-top: 18px;">
        <div class="head" style="display: flex; justify-content: space-between; align-items: flex-start; gap: 12px;">
          <div>
            <h3 x-text="t('kern.deepEvidence')"><span style="color: var(--muted-2); font-weight: 400; font-size: 12px;" x-text="t('kern.deepEvidenceSub')"></span></h3>
            <div style="margin-top: 4px; font-size: 11.5px; color: var(--muted-2);" x-text="t('kern.deepHint')"></div>
          </div>
          <div>
            <button class="btn" :disabled="deep.running" @click="runDeepEvidence(5)">
              <span x-show="!deep.running" x-text="t('kern.collectEvidence')"></span>
              <span x-show="deep.running" x-text="t('kern.collecting')"></span>
            </button>
          </div>
        </div>

        <!-- 不可用 -->
        <template x-if="deep.error">
          <div class="roofline-verdict empty" style="margin: 12px 0 0;">
            <span x-text="t('kern.unavailable', {err: deep.error})"></span>
          </div>
        </template>

        <!-- 结果 -->
        <template x-if="deep.result && deep.result.available">
          <div style="margin-top: 14px;">
            <!-- 注意:x-show 和内联 display:flex 不能放同一元素 —— Alpine 切回显示时把
                 display 置空回退成 block,flex/gap 全丢(实测踩过:卡片黏死)。拆两层。 -->
            <div x-show="deep.findings.length" style="margin-bottom: 20px;">
              <div style="display: flex; flex-direction: column; gap: 14px;">
                <template x-for="(f, i) in deep.findings" :key="i">
                  <div class="kfinding" :class="f.level">
                    <div class="kf-title" x-text="f.title"></div>
                    <div class="kf-detail" x-text="f.detail"></div>
                  </div>
                </template>
              </div>
            </div>

            <!-- #1 Warp 周期三态:发指令 / 就绪未选中(余量) / 真 stall -->
            <template x-if="warpSplit()">
              <div style="margin-bottom: 18px;">
                <div style="font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 8px;" x-text="t('kern.warpCycleDirection')"><span style="font-weight: 400; text-transform: none;" x-text="t('kern.allSamples', {n: fmt(deep.result.sample_total, 0)})"></span></div>
                <div style="display: flex; height: 18px; border-radius: 5px; overflow: hidden; background: #e9ebee;">
                  <div :style="`width:${warpSplit().issued}%;background:#0d8b80`" :title="t('cleanup.warpIssuedTitle', {pct: fmt(warpSplit().issued,1)})"></div>
                  <div :style="`width:${warpSplit().slack}%;background:#9bb04f`" :title="t('cleanup.warpSlackTitle', {pct: fmt(warpSplit().slack,1)})"></div>
                  <div :style="`width:${warpSplit().stall}%;background:#c2334f`" :title="t('cleanup.warpStallTitle', {pct: fmt(warpSplit().stall,1)})"></div>
                </div>
                <div style="display: flex; flex-wrap: wrap; gap: 6px 18px; margin-top: 9px; font-size: 11.5px; color: var(--muted);">
                  <span style="display: inline-flex; align-items: center; gap: 5px;"><span style="width:9px;height:9px;border-radius:2px;background:#0d8b80;display:inline-block;"></span><span x-text="t('kern.issued')"></span> <strong style="color: var(--text);" x-text="fmt(warpSplit().issued,1)+'%'"></strong></span>
                  <span style="display: inline-flex; align-items: center; gap: 5px;"><span style="width:9px;height:9px;border-radius:2px;background:#9bb04f;display:inline-block;"></span><span x-text="t('kern.slack')"></span> <strong style="color: var(--text);" x-text="fmt(warpSplit().slack,1)+'%'"></strong></span>
                  <span style="display: inline-flex; align-items: center; gap: 5px;"><span style="width:9px;height:9px;border-radius:2px;background:#c2334f;display:inline-block;"></span><span x-text="t('kern.stallWait')"></span> <strong style="color: var(--text);" x-text="fmt(warpSplit().stall,1)+'%'"></strong></span>
                </div>
                <div style="margin-top: 7px; font-size: 11.5px; color: var(--muted);" x-text="warpSplit().stall >= 60 ? t('kern.stallAnalysis') : (warpSplit().slack >= 30 ? t('kern.slackAnalysis') : t('kern.issuedAnalysis'))"></div>
              </div>
            </template>

            <!-- #2 全局 stall 构成(点行展开 → #4 原始 PerfWorks reason)-->
            <div style="font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 8px;" x-text="t('kern.stallBreakdown')"><span style="font-weight: 400; text-transform: none;" x-text="t('kern.stallBreakdownSub')"></span></div>
            <div style="display: flex; flex-direction: column; gap: 9px;">
              <template x-for="s in deep.result.stall_shares.filter(x => x.pct >= 0.5)" :key="s.cls">
                <div>
                  <div @click="stallExpanded = (stallExpanded === s.cls ? null : s.cls)"
                       :style="`display:flex;align-items:center;gap:10px;${(deep.result.reason_detail && deep.result.reason_detail[s.cls]) ? 'cursor:pointer' : ''}`">
                    <div style="width: 160px; font-size: 12px; color: var(--muted);">
                      <span x-text="stallLabel(s.cls)"></span>
                      <span style="color: var(--muted-2);" x-text="(deep.result.reason_detail && deep.result.reason_detail[s.cls]) ? (stallExpanded === s.cls ? '▴' : '▾') : ''"></span>
                    </div>
                    <div style="flex: 1; background: #e9ebee; border-radius: 4px; height: 16px; overflow: hidden;">
                      <div :style="`width:${Math.min(100, s.pct)}%;height:100%;background:${stallColor(s.cls)}`"></div>
                    </div>
                    <div style="width: 48px; text-align: right; font-size: 12px; font-variant-numeric: tabular-nums;" x-text="fmt(s.pct, 1) + '%'"></div>
                  </div>
                  <div x-show="stallMeaning(s.cls)" style="margin: 3px 0 0 170px; font-size: 11px; color: var(--muted-2);" x-text="stallMeaning(s.cls)"></div>
                  <!-- #4 原始 PerfWorks reason 下钻 -->
                  <div x-show="stallExpanded === s.cls && deep.result.reason_detail && deep.result.reason_detail[s.cls]"
                       style="margin: 7px 0 2px 170px; display: flex; flex-direction: column; gap: 3px;">
                    <template x-for="rd in (deep.result.reason_detail[s.cls] || [])" :key="rd.reason">
                      <div style="display: flex; gap: 10px; font-size: 11px; font-family: ui-monospace, Consolas, monospace;">
                        <span style="color: var(--text);" x-text="prettyReason(rd.reason)" :title="rd.reason"></span>
                        <span style="color: var(--muted-2);" x-text="t('cleanup.samplesCount', {n: fmt(rd.samples, 0)})"></span>
                      </div>
                    </template>
                  </div>
                </div>
              </template>
            </div>

            <!-- #3 测量方法卡:怎么测的 + 代价 -->
            <div style="margin-top: 18px; padding: 11px 14px; background: var(--surface-alt); border-radius: 8px; font-size: 11.5px; color: var(--muted); line-height: 1.7;">
              <strong style="color: var(--text); font-weight: 600;" x-text="t('kern.howMeasured')"></strong> <span x-text="t('kern.samplingPeriod', {period: Math.pow(2, deep.result.period_log2).toLocaleString(), log: deep.result.period_log2, w: fmt(deep.result.window_s, 0), samples: fmt(deep.result.sample_total, 0), getdata: fmt(deep.result.overhead.getdata_ms, 1), dropped: deep.result.overhead.dropped, hwfull: deep.result.overhead.hwfull})"></span>
            </div>
          </div>
        </template>

        <!-- 初始 -->
        <template x-if="!deep.result && !deep.error">
          <div class="roofline-verdict empty" style="margin: 12px 0 0;" x-text="t('kern.noInitialData')"></div>
        </template>
      </div>
    </div>

    <!-- ===== 规则 tab ===== -->
    <div x-show="tab === 'rules'" x-data="rulesTab()" x-init="init()">

      <!-- ===== 诊断配置:常驻顶部上下文条(业务形态 + SLA 常显;10 个阈值折进高级)===== -->
      <div class="cfg-bar">
        <div class="cfg-bar-main">
          <div class="cfg-seg">
            <span class="cfg-lbl" x-text="t('cfg.form')"></span>
            <select x-model="cfgDraft.workload_form" @change="onFormChange($event.target.value)">
              <template x-for="f in workloadForms" :key="f"><option :value="f" x-text="f"></option></template>
            </select>
          </div>
          <div class="cfg-seg">
            <span class="cfg-lbl">TTFT p99 SLA</span>
            <span class="cfg-unit"><input type="number" step="any" x-model.number="cfgDraft.sla_ttft_p99_ms"><i>ms</i></span>
          </div>
          <div class="cfg-seg">
            <span class="cfg-lbl">TPOT p99 SLA</span>
            <span class="cfg-unit"><input type="number" step="any" x-model.number="cfgDraft.sla_tpot_p99_ms"><i>ms</i></span>
          </div>
          <div class="cfg-spacer"></div>
          <div class="cfg-acts">
            <button class="cfg-adv-toggle" :class="{ open: advancedOpen }" @click="advancedOpen = !advancedOpen">
              <span class="chev">›</span><span x-text="t('cfg.advanced')"></span> <span x-text="`(${advKeys().length})`"></span>
            </button>
            <button class="btn secondary btn-sm" @click="resetConfig()" :disabled="!dirty()" x-text="t('common.reset')"></button>
            <button class="btn primary btn-sm" @click="saveConfig()" :disabled="!dirty() || saving" x-text="saving ? t('common.saving') : t('common.save')"></button>
          </div>
        </div>
        <div class="cfg-adv" x-show="advancedOpen" x-cloak>
          <div class="cfg-adv-head" x-text="active ? t('cfg.hintActive') : t('cfg.hintInactive')"></div>
          <div class="form-grid cfg-adv-grid">
            <template x-for="k in advKeys()" :key="k">
              <label>
                <span x-text="t(cfgLabels[k][0])"></span> <span class="hint-inline" x-text="`(${cfgLabels[k][1]})`"></span>
                <input type="number" step="any" x-model.number="cfgDraft[k]">
              </label>
            </template>
          </div>
        </div>
      </div>

      <!-- Currently triggered diagnoses (parent dashboard() scope) -->
      <div class="section-head" style="margin-top: 0;">
        <h2><span x-text="diagnosesStale ? t('rules.diagRecent') : t('rules.diagCurrent')"></span><span class="count" x-text="`(${diagnoses.length})`"></span></h2>
        <span class="hint" x-show="diagnoses.length > 0" x-text="diagnosesStale ? t('rules.staleHint') : t('rules.freshHint')"></span>
      </div>
      <div class="diagnoses" style="margin-bottom: 32px;">
        <template x-if="diagnoses.length === 0">
          <div class="empty">
            <div class="check">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <div class="title" x-text="t('rules.allGood')"></div>
            <div x-text="t('rules.none')"></div>
          </div>
        </template>
        <template x-for="d in diagnoses" :key="d.rule_id">
          <div class="diag" :class="d.severity">
            <div class="icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                <line x1="12" y1="9" x2="12" y2="13"/>
                <line x1="12" y1="17" x2="12.01" y2="17"/>
              </svg>
            </div>
            <div class="diag-body">
              <div class="diag-title-row">
                <div class="diag-title">
                  <h3 x-text="ruleName(d.rule_id)"></h3>
                  <div class="diag-meta">
                    <code x-text="d.rule_id"></code>
                    <span class="meta-sep"></span>
                    <span class="diag-cat" x-text="ruleCategory(d.rule_id) || '—'"></span>
                  </div>
                </div>
                <span class="sev-pill" :class="d.severity" x-text="d.severity"></span>
              </div>
              <div class="diag-msg" x-text="d.message"></div>
              <div class="diag-sug">
                <div class="diag-sug-label" x-text="t('common.suggestion')"></div>
                <div class="diag-sug-text" x-text="d.suggestion"></div>
              </div>
            </div>
          </div>
        </template>
      </div>

      <!-- 工具条:诊断配置(弹框)+ 新建自定义规则(弹框)-->
      <div class="rules-toolbar">
        <div class="section-head" style="margin: 0;">
          <h2><span x-text="t('rules.title')"></span><span class="count" x-text="`(${rules.length + customRules.length})`"></span></h2>
          <span class="hint" x-text="t('rules.hint')"></span>
        </div>
        <div style="display:flex; gap:8px;">
          <button class="btn primary" @click="newRule()" :disabled="!customEditable" :title="customEditable ? '' : t('rules.newRuleDisabled')" x-text="t('rules.newRule')"></button>
        </div>
      </div>

      <!-- 策展事实规则(引擎实跑;只读 —— 阈值改诊断配置)-->
      <div class="rules-list">
        <template x-for="r in rules" :key="r.id">
          <div class="rule-row">
            <div class="rule-row-main">
              <div class="rule-row-head">
                <h3 class="rule-row-name" x-text="r.name"></h3>
                <span class="sev-pill" :class="r.severity" x-text="r.severity"></span>
                <span class="badge default" x-text="t('kind.'+r.kind)"></span>
                <template x-if="r.requires_regime"><span class="badge" x-text="t('rules.onlyRegime')+r.requires_regime"></span></template>
              </div>
              <div class="rule-row-meta">
                <code x-text="r.id"></code>
