# pping-lang Deployment(k3s)。__TOKEN__ 由 remote_k8s.sh sed 替换。
# 烤好的本地镜像(imagePullPolicy: Never)+ nvidia runtimeClass + 1 GPU。
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pping-lang
  namespace: default
  labels: { app: pping-lang }
spec:
  replicas: 1
  strategy: { type: Recreate }        # 单 GPU:重建而非滚动,不会两份同时占卡
  selector:
    matchLabels: { app: pping-lang }
  template:
    metadata:
      labels: { app: pping-lang }
    spec:
      runtimeClassName: nvidia         # runw 上已有(nvidia-device-plugin + runtimeclass)
      containers:
        - name: pvllm
          image: __IMAGE__
          imagePullPolicy: Never       # 镜像由 docker save | k3s ctr import 进 containerd
          command: ["bash", "-lc"]
          args:
            - >
              pping-vllm serve "__MODEL__" --host 0.0.0.0 --port __OAI_PORT__
              --gpu-memory-utilization 0.5 --max-model-len 2048
          env:
            - { name: VLLM_USE_MODELSCOPE, value: "True" }
            - { name: MODELSCOPE_CACHE,   value: /models }
            - { name: HF_HOME,            value: /models }
            - { name: PPING_LANG_API_HOST, value: "0.0.0.0" }
            - { name: PPING_LANG_API_PORT, value: "__DASH_PORT__" }
            - { name: PPING_DEPLOY_TAG,    value: "runw-k8s" }
          ports:
            # hostPort:直接在节点 0.0.0.0:port 暴露(像 docker -p)→ http://<ip>:port 走 LAN/
            # tailscale 都通,绕开 traefik+nip.io(客户端代理拦域名时这条最稳)。ingress 仍并存。
            - { name: dash,   containerPort: __DASH_PORT__, hostPort: __DASH_PORT__ }
            - { name: openai, containerPort: __OAI_PORT__, hostPort: __OAI_PORT__ }
          # PC sampling(Kernel 级 Deep Evidence)要 GPU 性能计数器权限。宿主
          # RmProfilingAdminOnly=1 时,容器需 CAP_SYS_ADMIN 才被驱动当 admin 放行 CUPTI 采样。
          # 不开也不影响实时指标/诊断/压测(那些不需要)。
          securityContext:
            capabilities:
              add: ["SYS_ADMIN"]
          resources:
            limits: { nvidia.com/gpu: 1 }
          volumeMounts:
            - { name: models, mountPath: /models }
            - { name: shm,    mountPath: /dev/shm }   # vllm 要大 /dev/shm,默认 64M 不够
          readinessProbe:
            httpGet: { path: /v1/models, port: openai }
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 60        # 首次下模型久,给足时间
      volumes:
        - name: models
          hostPath: { path: __MODELS__, type: DirectoryOrCreate }
        - name: shm
          emptyDir: { medium: Memory, sizeLimit: 2Gi }
